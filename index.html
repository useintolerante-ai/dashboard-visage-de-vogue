<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Final 2025 - Visage de Vogue</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { background-image: linear-gradient(45deg, #f3ec78, #af4261); background-clip: text; -webkit-background-clip: text; color: transparent; margin: 0; font-size: 2.8em; font-weight: 700; }
        .filters { margin-bottom: 20px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px; }
        .filters button { background-color: #1a1a1a; border: 1px solid #444; color: #ddd; padding: 12px 25px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s ease; font-size: 1em; }
        .filters button.active, .filters button:hover { background-color: #af4261; color: #fff; border-color: #af4261; }
        .month-filter-container { display: flex; align-items: center; gap: 10px; }
        .month-filter-select { background-color: #1a1a1a; border: 1px solid #444; color: #ddd; padding: 12px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1em; }
        .view { display: none; }
        .view.active { display: block; }
        
        /* AJUSTE COMPLETO DO LAYOUT DOS CARDS */
        .grid {
            display: grid;
            gap: 20px;
            /* Define 6 colunas, dando menos espaço para a última (Nº de Vendas) */
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 0.7fr; 
        }
        .card {
            background-color: #161616;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #222;
            display: flex; /* USA FLEXBOX PARA ALINHAMENTO INTERNO */
            flex-direction: column;
            justify-content: space-between; /* ALINHA TÍTULO NO TOPO E NÚMERO NA BASE */
            min-height: 100px; /* GARANTE ALTURA MÍNIMA IGUAL PARA TODOS */
        }
        .card h3 {
            margin: 0;
            color: #888;
            text-transform: uppercase;
            font-size: 0.8em;
            font-weight: 500;
            text-align: center;
        }
        .kpi-value {
            margin: 10px 0 0 0;
            font-weight: 600;
            color: #fff;
            text-align: center;
            white-space: nowrap; /* IMPEDE A QUEBRA DE LINHA */
            overflow: hidden; /* Garante que não vai vazar */
            text-overflow: ellipsis; /* Adiciona '...' se for absurdamente grande */
            font-size: clamp(1.1em, 2.5vw, 1.9em); /* Ajuste fino da fonte */
        }
        /* FIM DO AJUSTE DOS CARDS */

        .table-container { background-color: #161616; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #222; overflow-x: auto; }
        h2 { color: #f0f0f0; text-align: center; font-weight: 600; }
        .item-row { background-color: #1e1e1e; margin-top: 10px; padding: 15px; border-radius: 8px; cursor: pointer; display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; transition: background-color 0.2s ease; gap: 10px;}
        .item-row:hover { background-color: #2a2a2a; }
        .item-name { font-weight: 600; font-size: 1.1em; word-break: break-word; }
        .item-total-compra { color: #a29bfe; text-align: right; }
        .item-total-value { font-weight: bold; color: #ff7675; font-size: 1.1em; text-align: right; }
        .details-row, .static-table { background-color: #111; padding: 20px; margin-top: -5px; border-radius: 0 0 8px 8px; }
        .details-row { display: none; }
        .details-row.visible { display: block; }
        .details-row table, .static-table table { width: 100%; border-collapse: collapse;}
        .details-row th, .details-row td, .static-table th, .static-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        .details-row th, .static-table th { color: #aaa; font-weight: 500; }
        .static-table tfoot td { font-weight: bold; color: #f0f0f0; background-color: #2a2a2a;}

        /* Media Query para telas menores (celulares) */
        @media (max-width: 768px) {
            .grid {
                /* Em telas menores, volta a ter 2 colunas iguais */
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Dashboard de Gestão 2025 | Visage de Vogue</h1></header>
        <main>
            <div class="filters">
                <button onclick="showView('visaoGeral')" class="active">Visão Geral</button>
                <button onclick="showView('crediario')">Crediário</button>
                <button onclick="showView('saidas')">Saídas</button>
            </div>
            
            <div id="visaoGeralView" class="view active">
                <div class="month-filter-container" style="justify-content: center; margin-bottom: 20px;">
                    <select id="geral-month-filter" class="month-filter-select" onchange="updateDashboard(this.value)"></select>
                </div>
                <div class="grid">
                    <div class="card"><h3>💰 Faturamento</h3><p class="kpi-value" id="kpi-faturamento">R$ 0,00</p></div>
                    <div class="card"><h3>💸 Saídas</h3><p class="kpi-value" id="kpi-saidas-geral">R$ 0,00</p></div>
                    <div class="card"><h3>📈 Lucro Bruto</h3><p class="kpi-value" id="kpi-lucro">R$ 0,00</p></div>
                    <div class="card"><h3>📥 Recebido (Cred.)</h3><p class="kpi-value" id="kpi-valor-recebido">R$ 0,00</p></div>
                    <div class="card"><h3>💳 A Receber (Cred.)</h3><p class="kpi-value" id="kpi-a-receber">R$ 0,00</p></div>
                    <div class="card"><h3>📊 Nº de Vendas</h3><p class="kpi-value" id="kpi-num-vendas">0</p></div>
                </div>
                <div class="chart-container" id="chart-container-geral" style="margin-top: 20px; height: 40vh;"><canvas id="mainChart"></canvas></div>
            </div>

            <div id="crediarioView" class="view">
                <div class="table-container">
                    <h2>Análise de Clientes <span style="font-size: 0.7em; color: #888;">(Clique para ver detalhes)</span></h2>
                    <div id="crediarioContainer"></div>
                </div>
            </div>

            <div id="saidasView" class="view">
                <div class="month-filter-container" style="justify-content: center; margin-bottom: 20px;">
                    <select id="saidas-month-filter" class="month-filter-select" onchange="renderSaidasView(this.value)"></select>
                </div>
                <div class="table-container">
                    <h2>Detalhamento de Saídas por Mês</h2>
                    <div id="saidasContainer" class="static-table"></div>
                </div>
            </div>
        </main>
    </div>

<script>
    // =======================================================================
    // CONFIGURAÇÕES DE CONEXÃO - NÃO ALTERAR A MENOS QUE SEJA NECESSÁRIO
    // =======================================================================
    const GOOGLE_SHEET_API_KEY = 'AIzaSyCPfPLSZ1jCEx1_ABkLj6iUvQGxeHC81I8'; // Não utilizado com Apps Script
    // *** URL DA SUA API DO GOOGLE APPS SCRIPT ATUALIZADA E CONFIRMADA ***
    const GOOGLE_APPS_SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwIP-5VZn2ZGuXcGRZS_ysvhpQrIwmpRKdV8L4mk8ckbs6DNGHWsGO1RPd9LN-PO0qe/exec';
    // =======================================================================

    // =======================================================================
    // DADOS INICIAIS (VÃO SER SUBSTITUÍDOS PELOS DADOS REAIS DA PLANILHA)
    // =======================================================================
    let dadosVendas2025 = [];
    let dadosSaidas2025 = [];
    let dadosPagamentosCrediario = [];
    let dadosCrediario = [];
    // =======================================================================

    let mainChart;
    const formatCurrency = (value) => value != null ? value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : 'R$ 0,00';
    const formatDate = (dateString) => {
        if (!dateString) return "N/A";
        const [year, month, day] = dateString.split('-');
        return `${day}/${month}/${year.slice(-2)}`;
    };

    async function loadDataFromGoogleSheet() {
        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_WEB_APP_URL);
            if (!response.ok) {
                throw new Error(`Erro ao carregar dados: ${response.status} ${response.statusText}`);
            }
            const data = await response.json();

            // *** ESTA É A LINHA DE DEBUG CRUCIAL: VERIFIQUE O CONSOLE DO SEU NAVEGADOR (F12) ***
            console.log("Dados recebidos da API:", data);

            // Agora o Apps Script envia 'vendas', e o HTML está preparado para receber 'vendas'
            // Garante que os arrays existam, mesmo que vazios
            dadosVendas2025 = data.vendas || []; // Recebe dados de 'vendas'
            dadosSaidas2025 = data.saidas || [];
            dadosPagamentosCrediario = data.pagamentosCrediario || [];
            dadosCrediario = data.crediario || [];

            // Calcula o total a receber (diferente do valor recebido, que é pagamentosCrediario)
            const totalAReceber = dadosCrediario.reduce((acc, curr) => acc + (curr.SaldoDevedor || 0), 0);
            document.getElementById('kpi-a-receber').innerText = formatCurrency(totalAReceber);

            populateMonthFilters();
            updateDashboard('todos');
            renderCrediarioView();
            renderSaidasView('todos');
            showView('visaoGeral');

        } catch (error) {
            console.error("Erro ao carregar dados da planilha:", error);
            alert("Não foi possível carregar os dados da planilha. Verifique a URL do Apps Script e as permissões. Consulte o console do navegador (F12) para mais detalhes.");
            
            // Define os KPIs para zero/vazio em caso de erro
            document.getElementById('kpi-faturamento').innerText = formatCurrency(0);
            document.getElementById('kpi-saidas-geral').innerText = formatCurrency(0);
            document.getElementById('kpi-lucro').innerText = formatCurrency(0);
            document.getElementById('kpi-valor-recebido').innerText = formatCurrency(0);
            document.getElementById('kpi-a-receber').innerText = formatCurrency(0);
            document.getElementById('kpi-num-vendas').innerText = '0';

            // Garante que o dashboard tente inicializar mesmo com erro na API para exibir estado de erro
            populateMonthFilters(); // Popula os filtros de mês
            updateDashboard('todos'); // Tenta atualizar o dashboard com dados vazios
            renderCrediarioView(); // Renderiza a view de crediário (mostrará "Nenhum dado...")
            renderSaidasView('todos'); // Renderiza a view de saídas (mostrará "Nenhuma saída...")
            showView('visaoGeral'); // Mostra a view inicial
        }
    }
    
    function populateMonthFilters() {
        const allDates = [...dadosVendas2025.map(d => d.Data), ...dadosSaidas2025.map(d => d.Data), ...dadosPagamentosCrediario.map(d => d.Data)];
        // Filtrar datas inválidas antes de mapear
        const validDates = allDates.filter(d => d); // Remove null, undefined, empty string
        const months = [...new Set(validDates.map(d => d.substring(0, 7)))].sort();
        
        const filters = document.querySelectorAll('.month-filter-select');
        filters.forEach(filter => {
            const currentVal = filter.value;
            filter.innerHTML = '<option value="todos">Ano Inteiro (2025)</option>';
            months.forEach(month => {
                const [year, monthNum] = month.split('-');
                const monthName = new Date(parseInt(year), parseInt(monthNum) - 1, 1).toLocaleString('pt-BR', { month: 'long' });
                filter.innerHTML += `<option value="${month}">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}</option>`;
            });
            filter.value = currentVal || 'todos';
        });
    }

    function updateDashboard(selectedMonth) {
        let filteredVendas = dadosVendas2025;
        if (selectedMonth && selectedMonth !== 'todos') {
            filteredVendas = dadosVendas2025.filter(d => d.Data && d.Data.startsWith(selectedMonth));
        }

        const faturamento = filteredVendas.reduce((acc, curr) => acc + (curr.Valor || 0), 0);
        const saidas = dadosSaidas2025.filter(s => s.Data && (selectedMonth === 'todos' || s.Data.startsWith(selectedMonth))).reduce((acc, curr) => acc + (curr.Valor || 0), 0);
        const recebido = dadosPagamentosCrediario.filter(p => p.Data && (selectedMonth === 'todos' || p.Data.startsWith(selectedMonth))).reduce((acc, curr) => acc + (curr.Valor || 0), 0);
        
        const lucro = faturamento - saidas;
        const numVendas = filteredVendas.length;
        
        document.getElementById('kpi-faturamento').innerText = formatCurrency(faturamento);
        document.getElementById('kpi-saidas-geral').innerText = formatCurrency(saidas);
        document.getElementById('kpi-lucro').innerText = formatCurrency(lucro);
        document.getElementById('kpi-lucro').style.color = lucro >= 0 ? '#20c997' : '#ff7675';
        document.getElementById('kpi-valor-recebido').innerText = formatCurrency(recebido);
        document.getElementById('kpi-num-vendas').innerText = numVendas;
        
        let graphData = {};
        if (selectedMonth === 'todos') {
            dadosVendas2025.forEach(venda => {
                if (venda.Data) { // Adicionado check para Data
                    const key = venda.Data.substring(0, 7);
                    if (!graphData[key]) graphData[key] = { Faturamento: 0, Saidas: 0 };
                    graphData[key].Faturamento += (venda.Valor || 0);
                }
            });
            dadosSaidas2025.forEach(saida => {
                if (saida.Data) { // Adicionado check para Data
                    const key = saida.Data.substring(0, 7);
                    if (!graphData[key]) graphData[key] = { Faturamento: 0, Saidas: 0 };
                    graphData[key].Saidas += (saida.Valor || 0);
                }
            });
        } else {
             filteredVendas.forEach(venda => {
                if (venda.Data) { // Adicionado check para Data
                    const key = venda.Data;
                    if (!graphData[key]) graphData[key] = { Faturamento: 0, Saidas: 0 };
                    graphData[key].Faturamento += (venda.Valor || 0);
                }
            });
            dadosSaidas2025.filter(s => s.Data && s.Data.startsWith(selectedMonth)).forEach(saida => { // Adicionado check para Data
                 const key = saida.Data;
                if (!graphData[key]) graphData[key] = { Faturamento: 0, Saidas: 0 };
                graphData[key].Saidas += (saida.Valor || 0);
            });
        }
        
        const labels = Object.keys(graphData).sort();
        const faturamentoData = labels.map(key => graphData[key].Faturamento || 0);
        const saidasData = labels.map(key => graphData[key].Saidas || 0);

        if (mainChart) mainChart.destroy();
        const chartContainer = document.getElementById('chart-container-geral');
        chartContainer.innerHTML = '<canvas id="mainChart"></canvas>';
        mainChart = new Chart(document.getElementById('mainChart'), { type: 'bar', data: { labels: labels.map(l => selectedMonth === 'todos' ? new Date(l+'-02').toLocaleString('default',{month:'short',year:'2-digit'}) : formatDate(l)), datasets: [ { label: 'Faturamento', data: faturamentoData, backgroundColor: '#af4261' }, { label: 'Saídas', data: saidasData, backgroundColor: '#6c757d' } ] }, options: { responsive: true, maintainAspectRatio: false, color: '#f0f0f0', scales: { y: { ticks: { color: '#aaa' }, grid: { color: '#222' } }, x: { ticks: { color: '#aaa' }, grid: { display: false } } } }});
    }
    
    function renderSaidasView(selectedMonth) {
        let filteredSaidas = dadosSaidas2025;
        if (selectedMonth && selectedMonth !== 'todos') {
            filteredSaidas = dadosSaidas2025.filter(s => s.Data && s.Data.startsWith(selectedMonth));
        }
        const totalSaidasMes = filteredSaidas.reduce((sum, item) => sum + (item.Valor || 0), 0);
        const container = document.getElementById('saidasContainer');
        let tableHTML = `<table><thead><tr><th>Data</th><th>Descrição da Saída</th><th style="text-align:right;">Valor</th></tr></thead><tbody>`;
        if (filteredSaidas.length > 0) {
            filteredSaidas.sort((a,b) => new Date(b.Data) - new Date(a.Data)).forEach(saida => {
                tableHTML += `<tr><td>${formatDate(saida.Data)}</td><td>${saida.Descricao}</td><td style="text-align:right;">${formatCurrency(saida.Valor)}</td></tr>`;
            });
        } else {
            tableHTML += `<tr><td colspan="3" style="text-align:center;">Nenhuma saída encontrada.</td></tr>`;
        }
        tableHTML += `</tbody><tfoot><tr><td colspan="2" style="text-align:right;">Total do Mês:</td><td style="text-align:right;">${formatCurrency(totalSaidasMes)}</td></tr></tfoot></table>`;
        container.innerHTML = tableHTML;
    }

    function renderCrediarioView() {
        const container = document.getElementById('crediarioContainer');
        container.innerHTML = '';
        const sortedData = dadosCrediario.filter(d => (d.SaldoDevedor || 0) > 0).sort((a, b) => (b.SaldoDevedor || 0) - (a.SaldoDevedor || 0));
        
        // **OBSERVAÇÃO IMPORTANTE:** O script do Google Apps Script atual NÃO busca detalhes de 'Compras' para cada cliente.
        // A função 'readCrediarioResumoData' no Apps Script retorna apenas Cliente, VendasTotais e SaldoDevedor.
        // Para que o clique em cada cliente exiba detalhes de compras (Data da Compra, Valor),
        // seria necessário modificar o script do Google Apps Script para buscar e incluir essas informações
        // no array 'crediario' antes de enviá-lo para o dashboard.
        // Por enquanto, a seção de detalhes de compra (quando você clica no cliente) mostrará "Nenhum detalhe de compra."
        // Se precisar dessa funcionalidade, me avise para ajustarmos o Apps Script.

        sortedData.forEach((item, index) => {
            const itemId = `crediario-details-${index}`;
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.setAttribute('onclick', `toggleDetails('${itemId}')`);
            itemRow.innerHTML = `<span class="item-name">${item.Cliente}</span><span class="item-total-compra">Total: ${formatCurrency(item.VendasTotais)}</span><span class="item-total-value">Devido: ${formatCurrency(item.SaldoDevedor)}</span>`;
            
            const detailsRow = document.createElement('div');
            detailsRow.className = 'details-row';
            detailsRow.id = itemId;
            let detailsTable = `<table><thead><tr><th>Data da Compra</th><th style="text-align:right;">Valor</th></tr></thead><tbody>`;
            // A condição abaixo dependerá do Apps Script fornecer 'item.Compras'
            if (item.Compras && item.Compras.length > 0) { 
                item.Compras.sort((a, b) => new Date(b.Data) - new Date(a.Data)).forEach(detail => {
                    detailsTable += `<tr><td>${formatDate(detail.Data)}</td><td style="text-align:right;">${formatCurrency(detail.Valor)}</td></tr>`;
                });
            } else {
                detailsTable += `<tr><td colspan="2" style="text-align:center;">Nenhum detalhe de compra.</td></tr>`;
            }
            detailsTable += '</tbody></table>';
            detailsRow.innerHTML = detailsTable;
            
            container.appendChild(itemRow);
            container.appendChild(detailsRow);
        });
    }

    function toggleDetails(elementId) { document.getElementById(elementId).classList.toggle('visible'); }
    function showView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewName + 'View').classList.add('active');
        document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.filters button[onclick="showView('${viewName}')"]`).classList.add('active');
    }
    // Inicializa o dashboard carregando os dados do Google Apps Script quando a página carrega
    window.onload = loadDataFromGoogleSheet;
</script>
</body>
</html>
